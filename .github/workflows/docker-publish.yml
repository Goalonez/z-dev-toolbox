name: Publish Web Docker Image

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: goalonez/z-dev-toolbox

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: release
        run: bash .github/scripts/parse-release-tag.sh

      - name: Ensure release tag points to main
        if: steps.release.outputs.publish_web == 'true'
        run: |
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q 'origin/main$'; then
            echo "Release tags must point to commits reachable from origin/main." >&2
            exit 1
          fi

      - name: Validate package version
        if: steps.release.outputs.publish_web == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if (pkg.version !== process.env.RELEASE_VERSION) { console.error('package.json version ' + pkg.version + ' does not match release version ' + process.env.RELEASE_VERSION); process.exit(1); }"

      - name: Set up Docker Buildx
        if: steps.release.outputs.publish_web == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.release.outputs.publish_web == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        if: steps.release.outputs.publish_web == 'true'
        id: meta
        env:
          PUBLISH_LATEST_IMAGE: ${{ steps.release.outputs.publish_latest_image }}
        run: |
          tags=(
            "${IMAGE_NAME}:${{ steps.release.outputs.version }}"
            "${IMAGE_NAME}:${{ steps.release.outputs.major_minor }}"
          )

          if [[ "${PUBLISH_LATEST_IMAGE}" == "true" ]]; then
            tags+=("${IMAGE_NAME}:latest")
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        if: steps.release.outputs.publish_web == 'true'
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          tag_args=()

          while IFS= read -r tag; do
            if [[ -n "${tag}" ]]; then
              tag_args+=(--tag "${tag}")
            fi
          done <<< "${IMAGE_TAGS}"

          for attempt in 1 2 3; do
            if docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push \
              "${tag_args[@]}" \
              .; then
              exit 0
            fi

            if [[ "${attempt}" == "3" ]]; then
              exit 1
            fi

            sleep $((attempt * 30))
          done
