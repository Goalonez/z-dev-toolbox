name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      publish_extension: ${{ steps.release.outputs.publish_extension }}
      publish_desktop: ${{ steps.release.outputs.publish_desktop }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: release
        run: bash .github/scripts/parse-release-tag.sh

      - name: Ensure release tag points to main
        run: |
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q 'origin/main$'; then
            echo "Release tags must point to commits reachable from origin/main." >&2
            exit 1
          fi

      - name: Validate package version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if (pkg.version !== process.env.RELEASE_VERSION) { console.error('package.json version ' + pkg.version + ' does not match release version ' + process.env.RELEASE_VERSION); process.exit(1); }"

      - name: Validate release notes
        run: |
          test -f "release-notes/${{ steps.release.outputs.tag }}.md"

  build-extension:
    needs: prepare
    if: needs.prepare.outputs.publish_extension == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package extension asset
        env:
          Z_DEV_TOOLBOX_RELEASE_ROOT: release-assets/build
        run: pnpm package:extension

      - name: Upload extension asset
        uses: actions/upload-artifact@v6
        with:
          name: extension-release-assets
          path: release-assets/build/z-dev-toolbox-extension-v${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error

  build-desktop:
    needs: prepare
    if: needs.prepare.outputs.publish_desktop == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            bundle: app,dmg
            artifact_name: macos-app-dmg
          - runner: windows-latest
            bundle: nsis
            artifact_name: windows-nsis
          - runner: ubuntu-22.04
            bundle: appimage
            artifact_name: linux-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check synced versions
        run: pnpm check:versions

      - name: Validate updater signing configuration
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        shell: bash
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "Missing secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

          if [[ -z "${TAURI_UPDATER_PUBLIC_KEY}" ]]; then
            echo "Missing secret: TAURI_UPDATER_PUBLIC_KEY" >&2
            exit 1
          fi

      - name: Write Tauri release config
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        shell: bash
        run: |
          node ./scripts/write-tauri-release-config.mjs \
            --output-file "apps/desktop/src-tauri/tauri.release.conf.json"

      - name: Build desktop bundle
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm --filter @z-dev-toolbox/desktop exec tauri
          args: --bundles ${{ matrix.bundle }} --config src-tauri/tauri.release.conf.json

      - name: Prepare desktop artifact
        run: node ./scripts/prepare-desktop-release-assets.mjs --runner "${{ matrix.runner }}" --version "${{ needs.prepare.outputs.version }}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.artifact_name }}
          path: release-assets/desktop-*/*
          if-no-files-found: error

  publish-release:
    needs:
      - prepare
      - build-extension
      - build-desktop
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build-extension.result == 'success' || needs.build-extension.result == 'skipped') &&
      (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download extension asset
        if: needs.prepare.outputs.publish_extension == 'true'
        uses: actions/download-artifact@v8
        with:
          name: extension-release-assets
          path: release-assets/raw/extension

      - name: Download desktop assets
        if: needs.prepare.outputs.publish_desktop == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          path: release-assets/raw

      - name: Normalize release assets
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node ./scripts/normalize-release-assets.mjs \
            --version "${RELEASE_VERSION}" \
            --source-dir "release-assets/raw" \
            --output-dir "release-assets/final"

      - name: Generate updater manifest
        if: needs.prepare.outputs.publish_desktop == 'true'
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          node ./scripts/generate-updater-manifest.mjs \
            --version "${RELEASE_VERSION}" \
            --tag "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --input-dir "release-assets/final" \
            --output-file "release-assets/final/latest.json" \
            --notes-file "release-notes/${RELEASE_TAG}.md"

      - name: Count release assets
        id: assets
        run: |
          shopt -s nullglob
          files=(release-assets/final/*)
          echo "count=${#files[@]}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release with assets
        if: steps.assets.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_DESKTOP: ${{ needs.prepare.outputs.publish_desktop }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          notes_file="release-notes/${RELEASE_TAG}.md"
          latest_args=()

          if [[ "${PUBLISH_DESKTOP}" != "true" ]]; then
            latest_args+=(--latest=false)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes-file "${notes_file}"
            gh release upload "${RELEASE_TAG}" release-assets/final/* --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            release-assets/final/* \
            --notes-file "${notes_file}" \
            "${latest_args[@]}" \
            --verify-tag

      - name: Publish GitHub release notes
        if: steps.assets.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_DESKTOP: ${{ needs.prepare.outputs.publish_desktop }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          notes_file="release-notes/${RELEASE_TAG}.md"
          latest_args=()

          if [[ "${PUBLISH_DESKTOP}" != "true" ]]; then
            latest_args+=(--latest=false)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes-file "${notes_file}"
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --notes-file "${notes_file}" \
            "${latest_args[@]}" \
            --verify-tag

      - name: Keep non-desktop release out of latest
        if: needs.prepare.outputs.publish_desktop != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          release_id=$(gh api "repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id')

          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "repos/${REPOSITORY}/releases/${release_id}" \
            -f make_latest=false
